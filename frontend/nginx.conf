server {
    listen 80;
    server_name _;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static assets (hashed filenames from Vite build) ──────────────────
    # Cache for 1 year — safe because Vite adds a content hash to filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API reverse proxy ──────────────────────────────────────────────────
    # Forwards /api/* to the backend Express server on the internal Docker
    # network. This mirrors the Vite dev proxy (vite.config.ts).
    location /api/ {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        # Forward cookies (needed for the httpOnly JWT cookie)
        proxy_pass_header  Set-Cookie;
    }

    # ── React Router — SPA fallback ────────────────────────────────────────
    # Any path not matching a real file is served as index.html so that
    # React Router can handle the route on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
